name: Nightly Travel Data Update

# This tells GitHub to run the script every night at midnight UTC
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually anytime

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run the Data Processing Script
        run: python update_data.py

      - name: Commit and Push the new advisories.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add advisories.json
          # Only commit if the data actually changed today
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated nightly data update from Canada.ca"
          git push
