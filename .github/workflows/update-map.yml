name: Nightly Travel Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run the Data Processing Script
        run: python update_data.py

      - name: Commit and Push the new advisories.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add advisories.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated nightly data update from Canada.ca"
          git push
